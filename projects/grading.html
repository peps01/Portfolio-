<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading System</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' fill='white'/>
  <text x='50%' y='60%' font-size='60' text-anchor='middle' fill='black' font-family='Arial'>A+</text>
</svg>">
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(20, 184, 166, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(239, 83, 80, 0.1) 0%, transparent 50%);
            animation: move 15s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes move {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -50px); }
            50% { transform: translate(-20px, 20px); }
            75% { transform: translate(50px, 30px); }
        }

        body {
            background: var(--bg-white);
            color: var(--text-dark);
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 32px;
            margin-top: 60px;
        }

        #homeLink {
            display: inline-flex;
            align-items: center;
            gap: 0.4em;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
            position: absolute;
            left: 20px;
            top: 24px;
        }
        #homeLink:hover {
            background: rgba(20, 184, 166, 0.1);
        }

        .wrapper {
            position: relative;
        }

        .image-slider {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 20px;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
        }
        .image-slider::-webkit-scrollbar { display: none; }

        .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: center;
        }

        .slide img {
            max-width: 100%;
            max-height: 500px;
            width: auto;
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .description {
            margin-top: 24px;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-light);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            min-height: 3em;
        }

        .counter {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-light);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            cursor: pointer;
            background: var(--bg-gray);
            color: var(--secondary);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--border);
            transition: all 0.3s;
            z-index: 2;
            user-select: none;
        }
        .arrow:hover {
            background: var(--secondary);
            color: white;
        }
        .left { left: 10px; }
        .right { right: 10px; }

        @media (max-width: 768px) {
            .container { padding: 20px 12px; }
            h1 { font-size: 22px; margin-top: 50px; }
            .slide img { max-height: 350px; }
            .arrow { width: 40px; height: 40px; font-size: 24px; }
            #homeLink { position: static; display: inline-flex; margin-bottom: 16px; }
        }

        @media (max-width: 480px) {
            .slide img { max-height: 280px; }
            .description { font-size: 14px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="../index.html" id="homeLink">🏠 Home</a>
        <h1>Grading System Preview</h1>

        <div class="wrapper">
            <div class="arrow left" id="left">&#10094;</div>
            <div class="arrow right" id="right">&#10095;</div>

            <div class="image-slider" id="slider"></div>
        </div>

        <div class="description" id="desc">No image selected</div>
        <div class="counter" id="counter"></div>
    </div>

    <script>
        const slider = document.getElementById("slider");
        const desc = document.getElementById("desc");
        const counter = document.getElementById("counter");

        const defaultSlides = [{
            desc: "This is the homepage of my Grading System project. It serves as the main entry point for users, providing an overview of the system's features and functionalities. From here, users can navigate to different sections of the application to access various services and information.",
            imageData: "grading_uploads/homepage.png"
        }, {
            desc: "This is the page where user can choose what role they want to login as. They can select from different roles such as student, teacher, and parent, each with its own set of features and functionalities tailored to their specific needs within the grading system.",
            imageData: "grading_uploads/role login.png"
        }, {
            desc: "Login page for instructor.",
            imageData: "grading_uploads/ins login.png"
        }, {
            desc: "This is the dashboard for instructor, where they can manage their classes, view student performance, and access various teaching tools. It provides an overview of their courses and allows them to efficiently navigate through their teaching responsibilities.",
            imageData: "grading_uploads/instructor dash.png"
        }, {
            desc: "Instructor can manage their account and update their profile information in this page. They can change their personal details, update their contact information, and manage their account settings to ensure that their profile is accurate and up-to-date.",
            imageData: "grading_uploads/ins prof.png"
        }, {
            desc: "Instructor can manage their subject they hold in this page. They can add new subjects, update existing ones, and remove subjects that are no longer relevant. This allows instructors to keep their subject offerings organized and up-to-date for their students.",
            imageData: "grading_uploads/ins ass sub.png"
        }, {
            desc: "Instructor can manage the attendance of each students whether theyre present, absent, or late. ",
            imageData: "grading_uploads/ins attendance.png"
        }, {
            desc: "Instructor can assigned subject to each sections he/she holds.",
            imageData: "grading_uploads/ass sub sec.png"
        }, {
            desc: "This is the page where instructor can manage the grades of every students in every sections.",
            imageData: "grading_uploads/ins grade manage.png"
        }, {
            desc: "This page shows the records of Instructors quizes, assignments, activities and exams that they have created for their students. Instructors can view the details of each record, including the title, description, and associated course information.",
            imageData: "grading_uploads/ins records.png"
        }, {
            desc: "Login page for students.",
            imageData: "grading_uploads/stud login.png"
        }, {
            desc: "Students can view their grades and performance in this page. They can see their overall grade for each subject, as well as detailed breakdowns of their performance on assignments, quizzes, and exams. This allows students to track their progress and identify areas where they may need to improve.",
            imageData: "grading_uploads/stud grades.png"
        }, {
            desc: "Students can submit appeal for their grades in this page. They can provide details about their appeal, such as the reason for the appeal and any supporting evidence. This allows students to request a review of their grades and seek clarification or adjustments if they believe there has been an error or unfair grading.",
            imageData: "grading_uploads/stud appeal.png"
        }, {
            desc: "This is the parents portal where they can use the code given to them by the school to access their child's performance and grades. Parents can view their child's academic progress, attendance records, and communicate with teachers through this portal.",
            imageData: "grading_uploads/parents login.png"
        }, {
            desc: "Parents can view the details of their child's USN, section and subjects they are enrolled in. This information helps parents stay informed about their child's academic progress and allows them to support their education effectively.",
            imageData: "grading_uploads/par sub attend.png"
        }, {
            desc: "Parents can view the grades of their child in this page. They can see their overall grade for each subject, as well as detailed breakdowns of their performance on assignments, quizzes, and exams. This allows parents to track their child's progress and identify areas where they may need to provide additional support.",
            imageData: "grading_uploads/par stud grades.png"
        }, {
            desc: "This is the login page for the admin. Admin can manage the users of the system, including students, instructors, and parents. They can create new user accounts, update existing ones, and remove accounts that are no longer needed. This allows the admin to maintain an organized and secure user database for the grading system.",
            imageData: "grading_uploads/admin login.png"
        }, {
            desc: "Admin can view the student records in this page. They can see the details of each student, including their personal information, academic performance, and attendance records. They can also generate the code for the parents to access their child's performance and grades. This allows the admin to manage student information effectively and provide necessary support to students and parents.",
            imageData: "grading_uploads/admin stud rec.png"
        }, {
            desc: "Admin can view the instructor records in this page. They can see the details of each instructor, including their personal information, courses they teach, and performance records. This allows the admin to manage instructor information effectively and ensure that instructors are providing quality education to students.",
            imageData: "grading_uploads/admin instruc list.png"
        }, {
            desc: "This page are for pending accounts that the admin needs to approve before they can access the system. Admin can review the details of each pending account, including the user's information and reason for registration. This allows the admin to maintain control over who can access the grading system and ensure that only authorized users are granted access.",
            imageData: "grading_uploads/admin acc manage.png"
        }, {
            desc: "Admin can add subjects in this page. They can create new subjects, update existing ones, and remove subjects that are no longer relevant.",
            imageData: "grading_uploads/admin acc manage.png"
        }, {
            desc: "Admin can add subjects in this page. They can create new subjects, update existing ones, and remove subjects that are no longer relevant.",
            imageData: "grading_uploads/admin add sub.png"
        }, {
            desc: "This page allows the admin to manage the courses offered in the grading system. Admin can add new courses, update existing ones, and remove courses that are no longer relevant. This helps ensure that the course offerings are up-to-date and aligned with the needs of students and instructors.",
            imageData: "grading_uploads/admin manage course.png"
        }, {
            desc: "Admin can manage the subjects offered in the grading system. They can add new subjects, update existing ones, and remove subjects that are no longer relevant.",
            imageData: "grading_uploads/admin manage sub.png"
        }, {
            desc: "This is the database table structure for the grading system.",
            imageData: "grading_uploads/grading db.png"
        }];

        function createSlide(description, imageSrc) {
            const newSlide = document.createElement("div");
            newSlide.classList.add("slide");
            newSlide.dataset.desc = description;
            newSlide.innerHTML = `<img src="${imageSrc}" alt="${description}">`;
            slider.appendChild(newSlide);
        }

        defaultSlides.forEach(slide => createSlide(slide.desc, slide.imageData));

        function updateCounter(index) {
            counter.textContent = `${index + 1} / ${defaultSlides.length}`;
        }

        let currentIndex = 0;

        function scrollToSlide(index) {
            const allSlides = document.querySelectorAll(".slide");
            if (index < 0) index = 0;
            if (index >= allSlides.length) index = allSlides.length - 1;
            currentIndex = index;
            allSlides[index].scrollIntoView({ behavior: "smooth", inline: "center" });
        }

        document.getElementById("right").onclick = () => scrollToSlide(currentIndex + 1);
        document.getElementById("left").onclick = () => scrollToSlide(currentIndex - 1);

        slider.addEventListener("scroll", () => {
            const allSlides = document.querySelectorAll(".slide");
            let found = false;
            allSlides.forEach((slide, index) => {
                const rect = slide.getBoundingClientRect();
                const center = window.innerWidth / 2;
                if (rect.left < center && rect.right > center) {
                    desc.textContent = slide.dataset.desc;
                    currentIndex = index;
                    updateCounter(index);
                    found = true;
                }
            });
            if (!found) {
                desc.textContent = "No image selected";
            }
        });

        setTimeout(() => {
            slider.dispatchEvent(new Event("scroll"));
        }, 100);
    </script>
</body>

</html>
