<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Municipal E-Services</title>
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #1a1a2e;
            color: white;
        }
        
        .container {
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .wrapper {
            position: relative;
        }
        
        .image-slider {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 20px;
            padding: 20px;
        }
        
        .image-slider::-webkit-scrollbar {
            display: none;
        }
        
        .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
        }
        
        .slide img {
            width: 80%;
            max-height: 600px;
            object-fit: cover;
        }
        
        .description {
            margin-top: 20px;
            font-size: 18px;
        }
        
        .arrow {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            font-size: 40px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 50%;
        }
        
        .left {
            left: 10px;
        }
        
        .right {
            right: 10px;
        }
        
        h1 {
            color: #e94560;
        }
        
        #homeLink {
            display: inline-block;
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            position: absolute;
            left: 20px;
            top: 20px;
        }
        
        #homeLink:hover {
            color: #c13651;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="../index.html" id="homeLink">🏠 Home</a>
        <h1>Municipal E-Services System Preview</h1>

        <div class="wrapper">
            <div class="arrow left" id="left">&#10094;</div>
            <div class="arrow right" id="right">&#10095;</div>

            <div class="image-slider" id="slider">
                <!-- Slides will be inserted here -->
            </div>
        </div>

        <div class="description" id="desc">No image selected</div>
    </div>

    <script>
        const slider = document.getElementById("slider");
        const desc = document.getElementById("desc");

        const defaultSlides = [{
            desc: "This is the home page of the Municipal E-Services System.",
            imageData: "muni_uploads/index.png"
        }, {
            desc: "This is the login page where users can access their accounts. Either citizens or municipal employees can log in to access their respective services.",
            imageData: "muni_uploads/login.png"
        }, {
            desc: "This is the dashboard for citizens, where they can view and manage their requests, access various municipal services, and stay updated with announcements.",
            imageData: "muni_uploads/resident dash.png"
        }, {
            desc: "This is where citzen submit their request for a service. They can fill out the necessary information and submit it to the municipality for processing.",
            imageData: "muni_uploads/submit application.png"
        }, {
            desc: "This is where citizen track the status of their submitted requests. They can see updates, communicate with municipal staff, and receive notifications about their applications.",
            imageData: "muni_uploads/track application.png"
        }, {
            desc: "This is the notification for citizen where they can see the updates about their request and also the announcement from municipality.",
            imageData: "muni_uploads/notif.png"
        }, {
            desc: "This is the dashboard for municipal staff, where they can manage citizen requests, access various administrative tools, and stay updated with internal announcements.",
            imageData: "muni_uploads/staffdash.png"
        }, {
            desc: "This is the page where resident applications are listed for municipal staff. They can review, process, and update the status of each application.",
            imageData: "muni_uploads/res app.png"
        }, {
            desc: "This is the report where municipal staff can generate various reports based on the data collected from citizen requests and services. They can analyze trends, monitor performance, and make informed decisions.",
            imageData: "muni_uploads/report.png"
        }, {
            desc: "This is the notification for municipal staff where they can see the updates about the citizen request and also the announcement from municipality.",
            imageData: "muni_uploads/staffnotif.png"
        }, {
            desc: "This is the dashboard for admin, where they can manage the entire system, oversee municipal operations, and access high-level reports and analytics.",
            imageData: "muni_uploads/admindash.png"
        }, {
            desc: "This is the page where admin manage the applications. They can review, process, and update the status of each application.",
            imageData: "muni_uploads/adminapp.png"
        }, {
            desc: "This is the page for admin where they can view the application data and use qr code to access the application details quickly. This feature enhances efficiency and allows for easy retrieval of information.",
            imageData: "muni_uploads/admin qr.png"
        }, {
            desc: "This is the page for admin to view all resident data. They can access the information of all residents in the system, which helps them to manage and provide better services to the community.",
            imageData: "muni_uploads/res list.png"
        }, {
            desc: "This is the report where admin can generate various reports based on the data collected from citizen requests and services. They can analyze trends, monitor performance, and make informed decisions.",
            imageData: "muni_uploads/admin report.png"
        }, {
            desc: "This is the notification of admin where they can see the request that needs the admin confirmation that came from the municipal staff and also the announcement from municipality.",
            imageData: "muni_uploads/admin notif.png"
        }, {
            desc: "This is the Treasurer dashboard where they can manage the payment of the citizen request. They can view the payment details, and confirm payments.",
            imageData: "muni_uploads/tres dash.png"
        }, {
            desc: "This is the page for treasurer where they can view the payment logs of the citizen request. They can see the details of each payment, including the amount, date, and status.",
            imageData: "muni_uploads/tres payment logs.png"
        }, {
            desc: "This is the page for treasurer where they can view, edit and manage the payment destination for the citizen request. They can ensure that payments are directed to the correct accounts and manage financial transactions effectively.",
            imageData: "muni_uploads/tres payment destination.png"
        }, {
            desc: "This is the database table structure for the municipal e-services system.",
            imageData: "muni_uploads/muni db.png"
        }];

        function createSlide(description, imageSrc) {
            const newSlide = document.createElement("div");
            newSlide.classList.add("slide");
            newSlide.dataset.desc = description;
            newSlide.innerHTML = `<img src="${imageSrc}" alt="${description}">`;
            slider.appendChild(newSlide);
        }

        defaultSlides.forEach(slide => createSlide(slide.desc, slide.imageData));

        let currentIndex = 0;

        function scrollToSlide(index) {
            const allSlides = document.querySelectorAll(".slide");

            if (index < 0) index = 0;
            if (index >= allSlides.length) index = allSlides.length - 1;

            currentIndex = index;

            allSlides[index].scrollIntoView({
                behavior: "smooth",
                inline: "center"
            });
        }

        document.getElementById("right").onclick = () => {
            scrollToSlide(currentIndex + 1);
        };

        document.getElementById("left").onclick = () => {
            scrollToSlide(currentIndex - 1);
        };

        slider.addEventListener("scroll", () => {
            const allSlides = document.querySelectorAll(".slide");
            let found = false;
            allSlides.forEach((slide, index) => {
                const rect = slide.getBoundingClientRect();
                const center = window.innerWidth / 2;
                if (rect.left < center && rect.right > center) {
                    desc.textContent = slide.dataset.desc;
                    currentIndex = index;
                    found = true;
                }
            });
            if (!found) {
                desc.textContent = "No image selected";
            }
        });

        // Trigger initial description
        setTimeout(() => slider.dispatchEvent(new Event("scroll")), 100);
    </script>
</body>

</html>
